<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Marketplace Clone</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="header">
    <div>Marketplace</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Keresés...">
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <h3>Kategóriák</h3>
        <div class="category" onclick="filterCategory('all')">Összes</div>
        <div class="category" onclick="filterCategory('tech')">Elektronika</div>
        <div class="category" onclick="filterCategory('fashion')">Ruházat</div>

        <!-- Termék feltöltő űrlap -->
        <div style="margin-top: 30px; padding: 10px; background: #fff; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1);">
            <h3>Termék feltöltése</h3>
            <input id="name" placeholder="Termék neve" style="width: 100%; margin-bottom: 8px; padding: 6px;"><br>
            <input id="price" placeholder="Ár" style="width: 100%; margin-bottom: 8px; padding: 6px;"><br>
            <input id="img" placeholder="Kép URL" style="width: 100%; margin-bottom: 8px; padding: 6px;"><br>
            <button onclick="addProduct()" style="width: 100%; padding: 8px; background-color: #1877f2; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Feltöltés
            </button>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="grid"></div>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalPrice"></p>
        <button onclick="closeModal()">Bezárás</button>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
