<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Marketplace Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="logo">Marketplace</div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Keresés...">
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <h3>Kategóriák</h3>
        <div class="category active" onclick="filterCategory('all', event)">Összes</div>
        <div class="category" onclick="filterCategory('tech', event)">Elektronika</div>
        <div class="category" onclick="filterCategory('fashion', event)">Ruházat</div>
        <div class="category" onclick="filterCategory('other', event)">Egyéb</div>

        <!-- Termék feltöltés -->
        <div class="upload-box">
            <h3>Termék feltöltése</h3>
            <input id="name" placeholder="Termék neve">
            <input id="price" placeholder="Ár">
            <input id="img" placeholder="Kép URL">
            <select id="category">
                <option value="tech">Elektronika</option>
                <option value="fashion">Ruházat</option>
                <option value="other">Egyéb</option>
            </select>

            <button id="uploadBtn" onclick="addProduct()">Feltöltés</button>
            <div id="uploadWarning" style="display:none; color:red;">
                Jelentkezz be a feltöltéshez!
            </div>
        </div>

        <!-- Auth -->
        <div class="auth-box">
            <h3>Bejelentkezés / Regisztráció</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Jelszó">
            <div class="auth-buttons">
                <button onclick="register()">Regisztráció</button>
                <button onclick="login()">Bejelentkezés</button>
            </div>
            <button onclick="logout()" id="logoutBtn">Kijelentkezés</button>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="grid"></div>
    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
