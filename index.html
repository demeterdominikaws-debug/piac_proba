<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Marketplace Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="logo">piac</div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Keresés...">
    </div>

    <!-- LOGIN / LOGOUT -->
    <div class="auth-top">
        <button onclick="openLogin()" id="loginBtn">Bejelentkezés</button>
        <button onclick="logout()" id="logoutBtn" style="display:none;">Kijelentkezés</button>
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <h3>Kategóriák</h3>

        <div class="category active" onclick="filterCategory('all', event)">Összes</div>
        <div class="category" onclick="filterCategory('tech', event)">Elektronika</div>
        <div class="category" onclick="filterCategory('fashion', event)">Ruházat</div>
        <div class="category" onclick="filterCategory('other', event)">Egyéb</div>

        <!-- TERMÉK FELTÖLTÉS -->
        <div class="upload-box" id="uploadBox">
            <h3>Termék feltöltése</h3>

            <!-- ÜZENET (ha nincs login) -->
            <div id="uploadMessage">
                Jelentkezz be a hirdetés feladásához 🔒
            </div>

            <!-- FORM (csak login után látszik) -->
            <div id="uploadForm">
                <input id="name" placeholder="Termék neve">
                <input id="price" placeholder="Ár">
                <input id="img" placeholder="Kép URL">

                <select id="category">
                    <option value="tech">Elektronika</option>
                    <option value="fashion">Ruházat</option>
                    <option value="other">Egyéb</option>
                </select>

                <button onclick="addProduct()">Feltöltés</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="grid"></div>
    </div>

</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">×</span>
    <h2>Bejelentkezés</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Jelszó">

    <button onclick="login()">Bejelentkezés</button>
    <button onclick="register()">Regisztráció</button>
  </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
